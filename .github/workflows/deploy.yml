# 部署到 GitHub Pages：push 到 main 即自动 build 并发布 dist。
# 站点在项目子路径下（<user>.github.io/cangyun-wiki/），base 已在 vite.config.js 配好。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许在 Actions 页手动触发

# GITHUB_TOKEN 授予发布 Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一次发布；新提交进来不打断进行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
